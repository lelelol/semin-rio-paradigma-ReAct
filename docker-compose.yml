version: "3.8"

# Optional: NATS message broker for distributed alert communication.
# The system works without this (using in-memory events),
# but NATS enables the full architecture described in the paper (Section III-C).
#
# Start with: docker-compose up -d
# Dashboard will auto-detect and connect if available.

services:
  nats:
    image: nats:latest
    container_name: cyber-nats
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
    command: ["--http_port", "8222", "--js"]  # Enable JetStream
    restart: unless-stopped
